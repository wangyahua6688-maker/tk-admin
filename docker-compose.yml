version: '3.8'
services:
  backend:
    build: .
    container_name: go-admin-backend
    ports:
      - "8080:8080"
    volumes:
      - .:/app
    environment:
      - GODASH_SERVER_HOST=0.0.0.0
      - GODASH_SERVER_PORT=8080
    depends_on:
      - redis

  redis:
    image: redis:7
    container_name: go-admin-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
